services:
  app:
    build: .
    container_name: php_app
    ports:
      - "8081:80"
      - "9323:9323"
    volumes:
      - ./src:/var/www/html
      - /var/www/html/vendor
    depends_on:
      - db_primario

  db_primario:
    image: mysql:8.0.30-debian
    container_name: mysql_db_primario
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: Voxel_Hosting
    command: >
      --server-id=1
      --log-bin=mysql-bin
      --gtid_mode=ON
      --enforce-gtid-consistency=ON
      --log_replica_updates=ON
      --binlog_format=ROW
    ports:
      - "3307:3306"
    volumes:
      - ./db/primario-init:/docker-entrypoint-initdb.d

  db_replica:
    image: mysql:8.0.30-debian
    container_name: mysql_db_replica
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
    command: >
      --server-id=2
      --relay-log=mysql-relay-bin
      --gtid_mode=ON
      --enforce-gtid-consistency=ON
      --log_replica_updates=ON
      --read-only=ON
      --log-bin=mysql-bin
      --binlog-format=row
      --binlog-expire-logs-seconds=604800
    ports:
      - "3308:3306"
    volumes:
      - ./db/replica-init:/docker-entrypoint-initdb.d

  proxysql:
    image: proxysql/proxysql:latest
    container_name: proxysql
    restart: always
    ports:
      - "6033:6033"
      - "6032:6032"
    volumes:
      - ./proxysql:/var/lib/proxysql